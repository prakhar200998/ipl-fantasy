            <template x-if="awards">
                <div>
                    <!-- ===== BEST XI THIS MATCH ===== -->
                    <template x-if="awards.best_xi_week && awards.best_xi_week.length > 0">
                        <div style="margin-bottom: 32px;">
                            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 16px;">
                                <div style="width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(249,115,22,0.1)); display: flex; align-items: center; justify-content: center;">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round">
                                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                                    </svg>
                                </div>
                                <div>
                                    <h2 class="heading-lg" style="margin: 0;">Best XI This Match</h2>
                                    <p style="font-size: 0.7rem; color: var(--text-muted); margin: 2px 0 0;">Top 11 individual performances in the latest match</p>
                                </div>
                            </div>

                            <div style="display: flex; flex-direction: column; gap: 6px;">
                                <template x-for="(player, xiIdx) in awards.best_xi_week" :key="player.player_name">
                                    <div class="card-flat stagger-in"
                                         :class="{ 'xi-gold-glow': xiIdx === 0 }"
                                         :style="'padding: 10px 16px; display: flex; align-items: center; gap: 12px; animation-delay: ' + (xiIdx * 0.04) + 's;'">

                                        <!-- Number -->
                                        <div class="xi-number"
                                             :style="xiIdx === 0
                                                 ? 'background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #451a03;'
                                                 : xiIdx === 1
                                                     ? 'background: rgba(156,163,175,0.15); color: #9ca3af; border: 1px solid rgba(156,163,175,0.2);'
                                                     : xiIdx === 2
                                                         ? 'background: rgba(217,119,6,0.15); color: #d97706; border: 1px solid rgba(217,119,6,0.2);'
                                                         : 'background: var(--bg-surface); color: var(--text-muted);'">
                                            <span x-text="xiIdx + 1"></span>
                                        </div>

                                        <!-- Player info -->
                                        <div style="flex: 1; min-width: 0;">
                                            <div style="font-weight: 700; font-size: 0.85rem;" x-text="player.display_name || player.player_name"></div>
                                            <div style="font-size: 0.65rem; color: var(--text-muted);" x-text="player.team_name || ''"></div>
                                        </div>

                                        <!-- Points -->
                                        <div style="font-weight: 800; font-size: 1rem;"
                                             :style="xiIdx === 0 ? 'color: var(--gold);' : ''"
                                             x-text="player.total_pts + ' pts'"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- ===== SEASON AWARDS ===== -->
                    <div style="margin-bottom: 32px;">
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 16px;">
                            <div style="width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(59,130,246,0.1)); display: flex; align-items: center; justify-content: center;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                            </div>
                            <div>
                                <h2 class="heading-lg" style="margin: 0;">Season Awards</h2>
                                <p style="font-size: 0.7rem; color: var(--text-muted); margin: 2px 0 0;">Cumulative leaders across the entire season</p>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr)); gap: 10px;">

                            <!-- Top Batter Season -->
                            <template x-if="awards.top_batter_season">
                                <div class="award-card" style="background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(59,130,246,0.02)); border: 1px solid rgba(59,130,246,0.15);">
                                    <div class="award-icon" style="background: rgba(59,130,246,0.15);">
                                        <span style="font-size: 1.2rem;">&#127951;</span>
                                    </div>
                                    <div style="font-size: 0.7rem; font-weight: 600; color: #60a5fa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">Top Batter</div>
                                    <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 2px;" x-text="awards.top_batter_season.display_name || awards.top_batter_season.player_name"></div>
                                    <div style="font-size: 0.7rem; color: var(--text-muted);" x-text="awards.top_batter_season.team_name"></div>
                                    <div style="margin-top: 8px; font-size: 0.8rem; font-weight: 700; color: #60a5fa;" x-text="awards.top_batter_season.batting_pts + ' batting pts'"></div>
                                </div>
                            </template>

                            <!-- Top Bowler Season -->
                            <template x-if="awards.top_bowler_season">
                                <div class="award-card" style="background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(139,92,246,0.02)); border: 1px solid rgba(139,92,246,0.15);">
                                    <div class="award-icon" style="background: rgba(139,92,246,0.15);">
                                        <span style="font-size: 1.2rem;">&#127936;</span>
                                    </div>
                                    <div style="font-size: 0.7rem; font-weight: 600; color: #a78bfa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">Top Bowler</div>
                                    <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 2px;" x-text="awards.top_bowler_season.display_name || awards.top_bowler_season.player_name"></div>
                                    <div style="font-size: 0.7rem; color: var(--text-muted);" x-text="awards.top_bowler_season.team_name"></div>
                                    <div style="margin-top: 8px; font-size: 0.8rem; font-weight: 700; color: #a78bfa;" x-text="awards.top_bowler_season.bowling_pts + ' bowling pts'"></div>
                                </div>
                            </template>

                            <!-- Top Fielder Season -->
                            <template x-if="awards.top_fielder_season">
                                <div class="award-card" style="background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(245,158,11,0.02)); border: 1px solid rgba(245,158,11,0.15);">
                                    <div class="award-icon" style="background: rgba(245,158,11,0.15);">
                                        <span style="font-size: 1.2rem;">&#129345;</span>
                                    </div>
                                    <div style="font-size: 0.7rem; font-weight: 600; color: #fbbf24; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">Top Fielder</div>
                                    <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 2px;" x-text="awards.top_fielder_season.display_name || awards.top_fielder_season.player_name"></div>
                                    <div style="font-size: 0.7rem; color: var(--text-muted);" x-text="awards.top_fielder_season.team_name"></div>
                                    <div style="margin-top: 8px; font-size: 0.8rem; font-weight: 700; color: #fbbf24;" x-text="awards.top_fielder_season.fielding_pts + ' fielding pts'"></div>
                                </div>
                            </template>

                            <!-- Best Match Performance -->
                            <template x-if="awards.best_match_performance">
                                <div class="award-card" style="background: linear-gradient(135deg, rgba(249,115,22,0.1), rgba(239,68,68,0.05)); border: 1px solid rgba(249,115,22,0.2);">
                                    <div class="award-icon" style="background: rgba(249,115,22,0.15);">
                                        <span style="font-size: 1.2rem;">&#128293;</span>
                                    </div>
                                    <div style="font-size: 0.7rem; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">Best Performance</div>
                                    <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 2px;" x-text="awards.best_match_performance.display_name || awards.best_match_performance.player_name"></div>
                                    <div style="font-size: 0.65rem; color: var(--text-muted);" x-text="awards.best_match_performance.match_teams ? awards.best_match_performance.match_teams.join(' vs ') : ''"></div>
                                    <div style="margin-top: 8px; font-size: 0.8rem; font-weight: 700; color: var(--accent-light);" x-text="awards.best_match_performance.total_pts + ' pts in a single match'"></div>
                                </div>
                            </template>

                            <!-- Most Consistent -->
                            <template x-if="awards.most_consistent">
                                <div class="award-card" style="background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(16,185,129,0.02)); border: 1px solid rgba(16,185,129,0.15);">
                                    <div class="award-icon" style="background: rgba(16,185,129,0.15);">
                                        <span style="font-size: 1.2rem;">&#128175;</span>
                                    </div>
                                    <div style="font-size: 0.7rem; font-weight: 600; color: #34d399; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">Most Consistent</div>
                                    <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 2px;" x-text="awards.most_consistent.display_name || awards.most_consistent.player_name"></div>
                                    <div style="font-size: 0.7rem; color: var(--text-muted);" x-text="awards.most_consistent.team_name"></div>
                                    <div style="margin-top: 8px; font-size: 0.8rem; font-weight: 700; color: #34d399;" x-text="awards.most_consistent.avg_pts + ' avg pts (' + awards.most_consistent.matches_played + ' matches)'"></div>
                                </div>
                            </template>

                            <!-- Carry Award -->
                            <template x-if="awards.carry_award">
                                <div class="award-card" style="background: linear-gradient(135deg, rgba(6,182,212,0.08), rgba(6,182,212,0.02)); border: 1px solid rgba(6,182,212,0.15);">
                                    <div class="award-icon" style="background: rgba(6,182,212,0.15);">
                                        <span style="font-size: 1.2rem;">&#128170;</span>
                                    </div>
                                    <div style="font-size: 0.7rem; font-weight: 600; color: #22d3ee; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">Carry Award</div>
                                    <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 2px;" x-text="awards.carry_award.display_name || awards.carry_award.player_name"></div>
                                    <div style="font-size: 0.7rem; color: var(--text-muted);" x-text="awards.carry_award.team_name"></div>
                                    <div style="margin-top: 8px; font-size: 0.8rem; font-weight: 700; color: #22d3ee;" x-text="awards.carry_award.percentage + '% of team total (' + awards.carry_award.total_pts + ' pts)'"></div>
                                </div>
                            </template>

                            <!-- Bench Burden -->
                            <template x-if="awards.bench_burden">
                                <div class="award-card" style="background: linear-gradient(135deg, rgba(100,116,139,0.08), rgba(100,116,139,0.02)); border: 1px solid rgba(100,116,139,0.15);">
                                    <div class="award-icon" style="background: rgba(100,116,139,0.12);">
                                        <span style="font-size: 1.2rem;">&#128186;</span>
                                    </div>

                                                                         'score-good': player.total_pts >= 20 && player.total_pts < 50,

    <!-- ============================================================
         ALPINE.JS APP
         ============================================================ -->
    <script>
    function fantasyApp() {
        return {
            // --- State ---
            tab: 'standings',
            standings: [],
            loading: false,
            error: null,

            expandedTeam: null,
            teamDetail: null,
            loadingDetail: false,
            expandedPlayer: null,

            awards: null,
            loadingAwards: false,
            awardsError: null,

            liveData: null,
            loadingLive: false,
            liveError: null,
            liveLastUpdated: null,
            liveTimer: null,
            expandedLiveTeam: null,
            apiUsage: null,
            prevLivePoints: {},

            // Chart state
            highlightedTeam: null,
            teamColors: [
                '#f97316', // orange
                '#3b82f6', // blue
                '#22c55e', // green
                '#a855f7', // purple
                '#ef4444', // red
                '#06b6d4', // cyan
                '#f59e0b', // amber
                '#ec4899', // pink
                '#6366f1', // indigo
            ],

            // H2H state
            h2hTeam1: '',
            h2hTeam2: '',
            h2hData: null,
            h2hLoading: false,
            h2hOpen: false,

            // ===================================================================
            // PLAYER METADATA (built dynamically from API response)
            // ===================================================================
            playerMetaMap: {},
            teamDesignationsMap: {},

            // IPL team name abbreviation mapping
            iplTeamAbbrev: {
                "Sunrisers Hyderabad": "SRH",
                "Gujarat Titans": "GT",
                "Mumbai Indians": "MI",
                "Chennai Super Kings": "CSK",
                "Kolkata Knight Riders": "KKR",
                "Delhi Capitals": "DC",
                "Royal Challengers Bengaluru": "RCB",
                "Royal Challengers Bangalore": "RCB",
                "Rajasthan Royals": "RR",
                "Lucknow Super Giants": "LSG",
                "Punjab Kings": "PBKS",
            },

            // ===================================================================
            // INIT
            // ===================================================================
            async init() {
                await this.loadStandings();
                // Load API usage in background
                try {
                    const res = await fetch('/api/status');
                    if (res.ok) {
                        const data = await res.json();
                        this.apiUsage = data.api_usage;
                    }
                } catch (e) {}
            },

            // ===================================================================
            // DATA FETCHING
            // ===================================================================
            async loadStandings() {
                this.loading = true;
                this.error = null;
                try {
                    const res = await fetch('/api/standings');
                    if (!res.ok) throw new Error('Failed to fetch');
                    this.standings = await res.json();

                    // Build player metadata and designations from API data
                    this.playerMetaMap = {};
                    this.teamDesignationsMap = {};
                    for (const team of this.standings) {
                        this.teamDesignationsMap[team.team_name] = { C: null, VC: null };
                        for (const p of team.players) {
                            let roleCode = '';
                            if (p.role === 'batsman') roleCode = 'BAT';
                            else if (p.role === 'bowler') roleCode = 'BOWL';
                            else if (p.role === 'all-rounder') roleCode = 'AR';
                            else if (p.role === 'wicket-keeper') roleCode = 'WK';

                            const iplAbbrev = this.iplTeamAbbrev[p.ipl_team] || p.ipl_team || '';
                            this.playerMetaMap[p.player_name] = { role: roleCode, ipl: iplAbbrev };

                            if (p.designation === 'C') this.teamDesignationsMap[team.team_name].C = p.player_name;
                            if (p.designation === 'VC') this.teamDesignationsMap[team.team_name].VC = p.player_name;
                        }
                    }
                } catch (e) {
                    this.error = e.message;
                    console.error('Standings error:', e);
                } finally {
                    this.loading = false;
                }
            },

            async loadTeamDetail(teamName) {
                this.loadingDetail = true;
                try {
                    const res = await fetch(`/api/team/${encodeURIComponent(teamName)}`);
                    if (!res.ok) throw new Error('Failed to fetch');
                    this.teamDetail = await res.json();
                } catch (e) {
                    console.error('Team detail error:', e);
                    this.teamDetail = null;
                } finally {
                    this.loadingDetail = false;
                }
            },

            async loadAwards() {
                if (this.awards) return;
                this.loadingAwards = true;
                this.awardsError = null;
                try {
                    const res = await fetch('/api/awards');
                    if (!res.ok) throw new Error('Failed to fetch');
                    this.awards = await res.json();
                } catch (e) {
                    this.awardsError = e.message;
                    console.error('Awards error:', e);
                } finally {
                    this.loadingAwards = false;
                }
            },

            async loadLive() {
                this.loadingLive = true;
                this.liveError = null;
                try {
                    // Save previous points for flash animation
                    const prevPoints = {};
                    if (this.liveData?.team_impacts) {
                        for (const impact of this.liveData.team_impacts) {
                            for (const p of impact.players) {
                                prevPoints[p.player_name] = p.total_pts;
                            }
                        }
                    }

                    const res = await fetch('/api/live');
                    if (!res.ok) throw new Error('Failed to fetch');
                    this.liveData = await res.json();
                    this.prevLivePoints = prevPoints;
                    this.liveLastUpdated = new Date().toLocaleTimeString();

                    // Set up auto-refresh if live
                    if (this.liveData?.match?.status === 'in_progress') {
                        this.startLivePolling();
                    } else {
                        this.stopLivePolling();
                    }
                } catch (e) {
                    this.liveError = e.message;
                    console.error('Live error:', e);
                } finally {
                    this.loadingLive = false;
                }
            },

            startLivePolling() {
                this.stopLivePolling();
                this.liveTimer = setInterval(async () => {
                    try {
                        // Save previous points for flash animation
                        const prevPoints = {};
                        if (this.liveData?.team_impacts) {
                            for (const impact of this.liveData.team_impacts) {
                                for (const p of impact.players) {
                                    prevPoints[p.player_name] = p.total_pts;
                                }
                            }
                        }

                        const res = await fetch('/api/live');
                        if (res.ok) {
                            this.liveData = await res.json();
                            this.prevLivePoints = prevPoints;
                            this.liveLastUpdated = new Date().toLocaleTimeString();
                            if (this.liveData?.match?.status !== 'in_progress') {
                                this.stopLivePolling();
                            }
                        }
                    } catch (e) {
                        console.error('Live poll error:', e);
                    }
                }, 30000);
            },

            stopLivePolling() {
                if (this.liveTimer) {
                    clearInterval(this.liveTimer);
                    this.liveTimer = null;
                }
            },

            // ===================================================================
            // TEAM EXPAND / COLLAPSE
            // ===================================================================
            async toggleTeam(teamName) {
                this.expandedPlayer = null;
                if (this.expandedTeam === teamName) {
                    this.expandedTeam = null;
                    this.teamDetail = null;
                    return;
                }
                this.expandedTeam = teamName;
                this.teamDetail = null;
                await this.loadTeamDetail(teamName);
            },

            toggleLiveTeam(teamName) {
                this.expandedLiveTeam = this.expandedLiveTeam === teamName ? null : teamName;
            },

            // ===================================================================
            // PLAYER METADATA HELPERS
            // ===================================================================
            getPlayerRole(playerName) {
                const meta = this.playerMetaMap[playerName];
                if (!meta || !meta.role) return '';
                return meta.role;
            },

            getRolePillClass(playerName) {
                const meta = this.playerMetaMap[playerName];
                if (!meta || !meta.role) return '';
                const r = meta.role;
                if (r === 'BAT') return 'role-bat';
                if (r === 'BOWL') return 'role-bowl';
                if (r === 'AR') return 'role-ar';
                if (r === 'WK') return 'role-wk';
                return '';
            },

            getPlayerIPLTeam(playerName) {
                return this.playerMetaMap[playerName]?.ipl || '';
            },

            getPlayerDesignation(teamName, playerName) {
                const d = this.teamDesignationsMap[teamName];
                if (!d) return '';
                if (d.C === playerName) return 'C';
                if (d.VC === playerName) return 'VC';
                return '';
            },

            getTeamCaptain(teamName) {
                const d = this.teamDesignationsMap[teamName];
                return d?.C || null;
            },

            getTeamVC(teamName) {
                const d = this.teamDesignationsMap[teamName];
                return d?.VC || null;
            },

            getEffectivePoints(teamName, player) {
                // Backend already applies C/VC multiplier to total_pts
                return player.total_pts;
            },

            // ===================================================================
            // CHART HELPERS
            // ===================================================================
            getCumulativeHistory(ptsHistory) {
                if (!ptsHistory || !ptsHistory.length) return [];
                let cumulative = [];
                let sum = 0;
                for (const pts of ptsHistory) {
                    sum += pts;
                    cumulative.push(sum);
                }
                return cumulative;
            },

            getChartWidth() {
                return 600;
            },

            getChartHeight() {
                return window.innerWidth < 640 ? 200 : 300;
            },

            getChartYMax(standings) {
                let max = 0;
                for (const team of standings) {
                    const cum = this.getCumulativeHistory(team.pts_history);
                    for (const v of cum) {
                        if (v > max) max = v;
                    }
                }
                return max || 100;
            },

            getChartGridLines(yMax, count) {
                const lines = [];
                for (let i = 1; i <= count; i++) {
                    lines.push(Math.round((yMax / count) * i));
                }
                return lines;
            },

            getChartPoints(standings, teamIdx, chartW, chartH, padL, padB) {
                const team = standings[teamIdx];
                if (!team?.pts_history?.length) return '';
                const cum = this.getCumulativeHistory(team.pts_history);
                const yMax = this.getChartYMax(standings);
                const numPoints = cum.length;
                const usableW = chartW - padL;
                const usableH = chartH - padB - 8;
                const points = cum.map((val, i) => {
                    const x = padL + (numPoints === 1 ? usableW / 2 : (i / (numPoints - 1)) * usableW);
                    const y = chartH - padB - ((val / yMax) * usableH);
                    return x.toFixed(1) + ',' + y.toFixed(1);
                });
                return points.join(' ');
            },

            buildChartSVG(standings, highlightedTeam) {
                if (!standings?.length || !standings[0]?.pts_history?.length) return '';
                const W = this.getChartWidth();
                const H = this.getChartHeight();
                const yMax = this.getChartYMax(standings);
                const gridLines = this.getChartGridLines(yMax, 5);
                const numMatches = standings[0].pts_history.length;

                let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;overflow:visible;">`;

                // Grid lines
                for (const yVal of gridLines) {
                    const y = (H - 24 - ((yVal / yMax) * (H - 32))).toFixed(1);
                    svg += `<line x1="40" y1="${y}" x2="${W}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
                    svg += `<text x="36" y="${(parseFloat(y) + 3).toFixed(1)}" fill="#475569" font-size="9" text-anchor="end" font-family="Inter,sans-serif">${yVal}</text>`;
                }

                // X-axis labels
                for (let mi = 0; mi < numMatches; mi++) {
                    const x = (40 + (mi * ((W - 40) / Math.max(numMatches - 1, 1)))).toFixed(1);
                    svg += `<text x="${x}" y="${H - 6}" fill="#475569" font-size="8" text-anchor="middle" font-family="Inter,sans-serif">M${mi + 1}</text>`;
                }

                // Team lines + data point circles
                for (let tIdx = 0; tIdx < standings.length; tIdx++) {
                    const pts = this.getChartPoints(standings, tIdx, W, H, 40, 24);
                    if (!pts) continue;
                    const color = this.teamColors[tIdx % this.teamColors.length];
                    const isHighlighted = highlightedTeam === standings[tIdx].team_name;
                    const opacity = highlightedTeam === null ? 0.8 : (isHighlighted ? 1.0 : 0.15);
                    const sw = isHighlighted ? 3 : 2;
                    svg += `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" style="opacity:${opacity};transition:opacity 200ms,stroke-width 200ms;" data-team="${tIdx}"/>`;

                    // Data point circles with tooltip
                    const cum = this.getCumulativeHistory(standings[tIdx].pts_history);
                    const coords = pts.split(' ');
                    coords.forEach((coord, ci) => {
                        const [cx, cy] = coord.split(',');
                        const r = isHighlighted ? 4 : 3;
                        svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" stroke="#1e293b" stroke-width="1.5" style="opacity:${opacity};transition:opacity 200ms;" data-team="${tIdx}">`;
                        svg += `<title>${standings[tIdx].team_name} — M${ci+1}: ${cum[ci]} pts</title>`;
                        svg += `</circle>`;
                    });
                }

                // Hit areas (transparent, wider for hover)
                for (let tIdx = 0; tIdx < standings.length; tIdx++) {
                    const pts = this.getChartPoints(standings, tIdx, W, H, 40, 24);
                    if (!pts) continue;
                    svg += `<polyline points="${pts}" fill="none" stroke="transparent" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" data-team="${tIdx}" style="cursor:pointer;"/>`;
                }

                svg += '</svg>';
                return svg;
            },

            handleChartHover(event, standings) {
                const el = event.target;
                const tIdx = el?.getAttribute?.('data-team');
                if (tIdx !== null && tIdx !== undefined && standings[tIdx]) {
                    this.highlightedTeam = standings[tIdx].team_name;
                }
            },

            handleChartClick(event, standings) {
                this.handleChartHover(event, standings);
            },

            // ===================================================================
            // TABLE HELPERS
            // ===================================================================
            getSplitPct(player, field) {
                const total = Math.abs(player.batting_pts || 0) + Math.abs(player.bowling_pts || 0) + Math.abs(player.fielding_pts || 0);
                if (total === 0) return 0;
                return Math.max(0, ((Math.abs(player[field] || 0) / total) * 100).toFixed(1));
            },

            getMatchScore(player, label) {
                if (!player.match_scores) return null;
                const found = player.match_scores.find(s => s.label === label);
                return found ? found.pts : null;
            },

            getPlayerBreakdown(player) {
                if (!player.match_scores?.length) return [];
                let runs=0, balls=0, fours=0, sixes=0, ducks=0, mp=0;
                let milePts=0, srPts=0;
                let wkts=0, dots=0, maidens=0, bBalls=0, bRuns=0;
                let wMilePts=0, ecoPts=0;
                let catches=0, runouts=0, stumpings=0, catch3Bonus=0;
                for (const ms of player.match_scores) {
                    if (!ms.breakdown) continue;
                    let b; try { b = JSON.parse(ms.breakdown); } catch(e) { continue; }
                    if (b.playing_xi) mp++;
                    if (b.batting) {
                        const r = b.batting.runs||0, bl = b.batting.balls||0;
                        runs += r; balls += bl; fours += b.batting.fours||0; sixes += b.batting.sixes||0;
                        if (b.batting.dismissed && r === 0) ducks++;
                        if (r >= 100) milePts += 16; else if (r >= 75) milePts += 12; else if (r >= 50) milePts += 8; else if (r >= 25) milePts += 4;
                        if ((bl >= 10 || r >= 20) && bl > 0) {
                            const sr = (r/bl)*100;
                            if (sr>190) srPts+=8; else if (sr>170) srPts+=6; else if (sr>150) srPts+=4; else if (sr>=130) srPts+=2;
                            else if (sr>=70&&sr<=100) srPts-=2; else if (sr>=60&&sr<70) srPts-=4; else if (sr>=50&&sr<60) srPts-=6;
                        }
                    }
                    if (b.bowling) {
                        const w=b.bowling.wickets||0; wkts+=w; dots+=b.bowling.dots||0; maidens+=b.bowling.maidens||0;
                        bBalls+=b.bowling.balls||0; bRuns+=b.bowling.runs||0;
                        if (w>=5) wMilePts+=16; else if (w>=4) wMilePts+=12; else if (w>=3) wMilePts+=8;
                        if (b.bowling.balls>=12) {
                            const eco=b.bowling.runs/(b.bowling.balls/6);
                            if (eco<5) ecoPts+=8; else if (eco<6) ecoPts+=6; else if (eco<=7) ecoPts+=4; else if (eco<=8) ecoPts+=2;
                            else if (eco>=10&&eco<=11) ecoPts-=2; else if (eco>11&&eco<=12) ecoPts-=4; else if (eco>12) ecoPts-=6;
                        }
                    }
                    if (b.fielding) {
                        const c=b.fielding.catches||0; catches+=c; runouts+=b.fielding.runouts||0; stumpings+=b.fielding.stumpings||0;
                        if (c>=3) catch3Bonus+=4;
                    }
                }
                const chips = [];
                if (mp) chips.push({l:`${mp}× XI`, p:mp*4});
                if (runs) chips.push({l:`${runs} runs`, p:runs});
                if (fours) chips.push({l:`${fours}×4s`, p:fours*4});
                if (sixes) chips.push({l:`${sixes}×6s`, p:sixes*6});
                if (ducks) chips.push({l:`${ducks} duck`, p:ducks*-2});
                if (milePts) chips.push({l:'Milestones', p:milePts});
                if (srPts) chips.push({l:'SR bonus', p:srPts});
                if (wkts) chips.push({l:`${wkts}W`, p:wkts*30});
                if (dots) chips.push({l:`${dots} dots`, p:dots*2});
                if (maidens) chips.push({l:`${maidens} maiden`, p:maidens*12});
                if (wMilePts) chips.push({l:'W milestone', p:wMilePts});
                if (ecoPts) chips.push({l:'Economy', p:ecoPts});
                if (catches) chips.push({l:`${catches} catch`, p:catches*8});
                if (catch3Bonus) chips.push({l:'3+ catches', p:catch3Bonus});
                if (runouts) chips.push({l:`${runouts} runout`, p:runouts*10});
                if (stumpings) chips.push({l:`${stumpings} stumping`, p:stumpings*12});
                return chips;
            },

            getScoreClass(score) {
                if (score === null) return 'neutral';
                if (score >= 50) return 'score-excellent';
                if (score >= 20) return 'score-good';
                if (score >= 0) return 'score-ok';
                if (score >= -10) return 'score-bad';
                return 'score-terrible';
            },

            // ===================================================================
            // PROJECTED STANDINGS (computed from current standings + live impact)
            // ===================================================================
            get projectedStandings() {
                if (!this.standings.length || !this.liveData?.team_impacts?.length) return [];

                const impactMap = {};
                for (const impact of this.liveData.team_impacts) {
                    impactMap[impact.team_name] = impact.match_pts || 0;
                }

                const projected = this.standings.map(team => ({
                    team_name: team.team_name,
                    current_pts: team.total_pts,
                    live_delta: impactMap[team.team_name] || 0,
                    projected_pts: team.total_pts + (impactMap[team.team_name] || 0),
                }));

                projected.sort((a, b) => b.projected_pts - a.projected_pts);
                return projected;
            },

            // ===================================================================
            // SPARKLINE HELPER
            // ===================================================================
            computeSparkline(data, w, h) {
                if (!data || data.length < 2) return '';
                const max = Math.max(...data);
                const min = Math.min(...data);
                const range = max - min || 1;
                const step = w / (data.length - 1);
                return data.map((v, i) => `${i * step},${h - ((v - min) / range) * (h - 4) - 2}`).join(' ');
            },

            // ===================================================================
            // HEAD-TO-HEAD
            // ===================================================================
            async loadH2H() {
                if (!this.h2hTeam1 || !this.h2hTeam2 || this.h2hTeam1 === this.h2hTeam2) return;
                this.h2hLoading = true;
                this.h2hData = null;
                try {
                    const res = await fetch(`/api/h2h?team1=${encodeURIComponent(this.h2hTeam1)}&team2=${encodeURIComponent(this.h2hTeam2)}`);
                    if (res.ok) this.h2hData = await res.json();
                } catch (e) {
                    console.error('H2H error:', e);
                } finally {
                    this.h2hLoading = false;
                }
            },

            // ===================================================================
            // FORMATTING
            // ===================================================================
            formatDate(dateStr) {
                if (!dateStr) return '';
                try {
                    const d = new Date(dateStr);
                    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                } catch {
                    return dateStr;
                }
            },
        }
    }
    </script>
