<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Fantasy League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        }
    </script>
    <style>
        /* ================================================================
           CSS CUSTOM PROPERTIES — THEME
           ================================================================ */
        :root {
            --bg-base: #0a0e17;
            --bg-card: #0f1523;
            --bg-card-hover: #131a2b;
            --bg-elevated: #162033;
            --bg-surface: #1a2640;
            --bg-input: #111827;

            --border-subtle: rgba(255,255,255,0.06);
            --border-medium: rgba(255,255,255,0.1);
            --border-accent: rgba(249,115,22,0.3);
            --border-glow: rgba(249,115,22,0.5);

            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-dimmed: #475569;

            --accent: #f97316;
            --accent-light: #fb923c;
            --accent-dark: #ea580c;
            --gold: #fbbf24;
            --gold-dark: #d97706;
            --silver: #9ca3af;
            --bronze: #cd7f32;

            --role-bat: #3b82f6;
            --role-bowl: #8b5cf6;
            --role-ar: #22c55e;
            --role-wk: #f59e0b;

            --glass-bg: rgba(15, 21, 35, 0.7);
            --glass-border: rgba(255,255,255,0.08);

            --anim-fast: 150ms;
            --anim-med: 300ms;
            --anim-slow: 500ms;
        }

        /* ================================================================
           RESET & BASE
           ================================================================ */
        [x-cloak] { display: none !important; }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ================================================================
           SCROLLBAR
           ================================================================ */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        /* ================================================================
           BACKGROUND PATTERN
           ================================================================ */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 800px 600px at 20% 10%, rgba(249,115,22,0.04), transparent),
                radial-gradient(ellipse 600px 400px at 80% 80%, rgba(59,130,246,0.03), transparent);
            pointer-events: none;
            z-index: 0;
        }

        /* ================================================================
           TYPOGRAPHY
           ================================================================ */
        .gradient-text {
            background: linear-gradient(135deg, #f97316, #fb923c, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .heading-xl {
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .heading-lg {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .heading-md {
            font-size: clamp(0.95rem, 2vw, 1.125rem);
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .text-xs-tight {
            font-size: 0.7rem;
            line-height: 1.2;
        }

        /* ================================================================
           GLASS EFFECTS
           ================================================================ */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }

        .glass-strong {
            background: rgba(15, 21, 35, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ================================================================
           CARDS
           ================================================================ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            transition: all var(--anim-med) cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: visible;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, transparent, transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            transition: background var(--anim-med);
            pointer-events: none;
        }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-medium);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25), 0 0 0 1px rgba(249,115,22,0.08);
        }

        .card:hover::before {
            background: linear-gradient(135deg, rgba(249,115,22,0.3), rgba(251,191,36,0.1), transparent);
        }

        .card-flat {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
        }

        /* ================================================================
           RANK BADGES
           ================================================================ */
        .rank-badge {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.875rem;
            flex-shrink: 0;
        }

        .rank-1 {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #451a03;
            box-shadow: 0 0 20px rgba(251,191,36,0.3);
        }

        .rank-2 {
            background: linear-gradient(135deg, #d1d5db, #9ca3af);
            color: #1f2937;
            box-shadow: 0 0 16px rgba(156,163,175,0.2);
        }

        .rank-3 {
            background: linear-gradient(135deg, #d97706, #b45309);
            color: #fff;
            box-shadow: 0 0 16px rgba(217,119,6,0.2);
        }

        .rank-default {
            background: var(--bg-surface);
            color: var(--text-muted);
            border: 1px solid var(--border-subtle);
        }

        /* ================================================================
           ROLE PILLS
           ================================================================ */
        .role-pill {
            font-size: 0.6rem;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.6;
            display: inline-block;
        }

        .role-bat { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .role-bowl { background: rgba(139,92,246,0.15); color: #a78bfa; }
        .role-ar { background: rgba(34,197,94,0.15); color: #4ade80; }
        .role-wk { background: rgba(245,158,11,0.15); color: #fbbf24; }

        /* ================================================================
           C / VC BADGES
           ================================================================ */
        .badge-c {
            font-size: 0.55rem;
            font-weight: 800;
            padding: 1px 5px;
            border-radius: 4px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #451a03;
            letter-spacing: 0.02em;
            line-height: 1.5;
            vertical-align: middle;
            margin-left: 4px;
        }

        .badge-vc {
            font-size: 0.55rem;
            font-weight: 800;
            padding: 1px 5px;
            border-radius: 4px;
            background: linear-gradient(135deg, #d1d5db, #9ca3af);
            color: #1f2937;
            letter-spacing: 0.02em;
            line-height: 1.5;
            vertical-align: middle;
            margin-left: 4px;
        }

        /* ================================================================
           MULTIPLIER BADGE
           ================================================================ */
        .multiplier-badge {
            font-size: 0.55rem;
            font-weight: 700;
            padding: 0px 4px;
            border-radius: 3px;
            background: rgba(249,115,22,0.15);
            color: var(--accent);
            margin-left: 4px;
        }

        /* ================================================================
           SPLIT BAR
           ================================================================ */
        .split-bar {
            height: 6px;
            border-radius: 3px;
            background: var(--bg-surface);
            overflow: hidden;
            display: flex;
            min-width: 80px;
        }

        .split-bat { background: var(--role-bat); border-radius: 3px 0 0 3px; }
        .split-bowl { background: var(--role-bowl); }
        .split-field { background: var(--role-wk); border-radius: 0 3px 3px 0; }

        /* ================================================================
           TABS
           ================================================================ */
        .tab-btn {
            position: relative;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-muted);
            border-radius: 10px;
            transition: all var(--anim-fast);
            cursor: pointer;
            border: none;
            background: transparent;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--text-secondary);
            background: rgba(255,255,255,0.03);
        }

        .tab-btn.active {
            color: var(--text-primary);
            background: rgba(249,115,22,0.1);
            box-shadow: 0 0 0 1px rgba(249,115,22,0.2);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 2px;
            background: var(--accent);
            border-radius: 1px;
        }

        /* ================================================================
           ACCORDION
           ================================================================ */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .accordion-content.open {
            max-height: 3000px;
        }

        .accordion-chevron {
            transition: transform var(--anim-med) cubic-bezier(0.4, 0, 0.2, 1);
        }

        .accordion-chevron.rotated {
            transform: rotate(180deg);
        }

        /* ================================================================
           SHIMMER / LOADING
           ================================================================ */
        @keyframes shimmer {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }

        .shimmer {
            background: linear-gradient(90deg,
                var(--bg-card) 25%,
                var(--bg-elevated) 50%,
                var(--bg-card) 75%
            );
            background-size: 800px 100%;
            animation: shimmer 1.5s infinite ease-in-out;
            border-radius: 8px;
        }

        /* ================================================================
           PULSE LIVE
           ================================================================ */
        @keyframes livePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: livePulse 1.5s infinite;
            display: inline-block;
        }

        .live-ring {
            position: relative;
        }

        .live-ring::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid rgba(239,68,68,0.4);
            animation: livePulse 1.5s infinite;
        }

        /* ================================================================
           FIRE / ON FIRE BADGE
           ================================================================ */
        @keyframes fireGlow {
            0%, 100% { box-shadow: 0 0 8px rgba(249,115,22,0.4); }
            50% { box-shadow: 0 0 20px rgba(249,115,22,0.7); }
        }

        .on-fire {
            animation: fireGlow 2s infinite;
            background: linear-gradient(135deg, rgba(249,115,22,0.2), rgba(239,68,68,0.15));
            border: 1px solid rgba(249,115,22,0.3);
        }

        .fire-badge {
            font-size: 0.6rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 6px;
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        /* ================================================================
           AWARD CARDS
           ================================================================ */
        .award-card {
            border-radius: 14px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            transition: all var(--anim-med);
        }

        .award-card:hover {
            transform: translateY(-3px);
        }

        .award-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 100px;
            border-radius: 0 0 0 100px;
            opacity: 0.05;
            pointer-events: none;
        }

        .award-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        /* ================================================================
           TOOLTIP
           ================================================================ */
        .tooltip-trigger {
            position: relative;
            cursor: help;
        }

        .tooltip-trigger .tooltip-text {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            z-index: 50;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: var(--text-primary);
            font-size: 0.7rem;
            font-weight: 500;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-medium);
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            transition: opacity var(--anim-fast), visibility var(--anim-fast);
            pointer-events: none;
        }

        .tooltip-trigger .tooltip-text::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #1e293b;
        }

        .tooltip-trigger:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        /* ================================================================
           PLAYER TABLE
           ================================================================ */
        .player-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .player-table thead th {
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            background: var(--bg-card);
            z-index: 5;
            white-space: nowrap;
        }

        .player-table thead th:first-child { padding-left: 16px; }

        .player-table tbody tr {
            transition: background var(--anim-fast);
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        .player-table tbody tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .player-table tbody td {
            padding: 8px 10px;
            vertical-align: middle;
            white-space: nowrap;
        }

        .player-table tbody td:first-child { padding-left: 16px; }

        .player-dimmed {
            opacity: 0.35;
        }

        .player-dimmed:hover {
            opacity: 0.6;
        }

        /* Match score cells */
        .match-cell {
            font-size: 0.7rem;
            font-weight: 600;
            min-width: 36px;
            text-align: center;
            padding: 4px 6px !important;
        }

        .match-cell.positive { color: #4ade80; }
        .match-cell.negative { color: #f87171; }
        .match-cell.neutral { color: var(--text-muted); }

        /* ================================================================
           STATUS BADGE
           ================================================================ */
        .status-live {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            font-size: 0.7rem;
            font-weight: 700;
            color: #f87171;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-completed {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.25);
            font-size: 0.7rem;
            font-weight: 700;
            color: #4ade80;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ================================================================
           NUMBER ANIMATION
           ================================================================ */
        @keyframes countUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: countUp 0.4s ease-out forwards;
        }

        /* ================================================================
           BEST XI GLOW
           ================================================================ */
        .xi-gold-glow {
            box-shadow: 0 0 20px rgba(251,191,36,0.15);
            border-color: rgba(251,191,36,0.3) !important;
        }

        /* ================================================================
           RESPONSIVE TABLE CONTAINER
           ================================================================ */
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Hide split bar and avg on mobile */
        @media (max-width: 768px) {
            .hide-mobile { display: none !important; }
            .tab-btn { padding: 8px 14px; font-size: 0.8rem; }
            .rank-badge { width: 30px; height: 30px; font-size: 0.75rem; border-radius: 8px; }
            .player-table { font-size: 0.75rem; }
            .player-table thead th, .player-table tbody td { padding: 6px 6px; }
            .card { border-radius: 12px; }
            .team-header-row { padding: 12px 14px !important; gap: 10px !important; }
            .team-info-sub { gap: 6px !important; }
            .heading-md { font-size: 0.9rem !important; }
        }

        @media (max-width: 480px) {
            .heading-xl { font-size: 1.3rem; }
            .match-cell { min-width: 28px; font-size: 0.6rem; padding: 3px 3px !important; }
            .team-header-row { padding: 10px 12px !important; gap: 8px !important; }
            .rank-badge { width: 28px; height: 28px; font-size: 0.7rem; border-radius: 7px; }
            .team-pts { font-size: 1.05rem !important; }
            .badge-c, .badge-vc { font-size: 0.5rem; padding: 1px 4px; }
            .award-card { padding: 14px !important; border-radius: 12px !important; }
            .award-icon { width: 40px !important; height: 40px !important; border-radius: 12px !important; }
            .xi-number { width: 22px; height: 22px; font-size: 0.65rem; border-radius: 5px; }
        }

        /* ================================================================
           COMPLETED BADGE (Green)
           ================================================================ */
        .badge-completed {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.25);
            color: #4ade80;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* ================================================================
           POINTS HIGHLIGHT
           ================================================================ */
        .pts-highlight {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
        }

        /* ================================================================
           FADE IN STAGGER
           ================================================================ */
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stagger-in {
            opacity: 0;
            animation: fadeSlideIn 0.4s ease-out forwards;
        }

        /* ================================================================
           ERROR STATE
           ================================================================ */
        .error-container {
            text-align: center;
            padding: 60px 20px;
        }

        .retry-btn {
            padding: 10px 24px;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            font-weight: 700;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            transition: all var(--anim-fast);
        }

        .retry-btn:hover {
            background: var(--accent-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(249,115,22,0.3);
        }

        /* ================================================================
           HEADER BAR
           ================================================================ */
        .header-bar {
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
        }

        /* ================================================================
           FOOTER
           ================================================================ */
        .footer-text {
            color: var(--text-dimmed);
            font-size: 0.7rem;
            text-align: center;
            padding: 24px 0 32px;
        }

        /* Subtle link style */
        .subtle-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color var(--anim-fast);
        }
        .subtle-link:hover { color: var(--accent-light); }

        /* ================================================================
           BEST XI NUMBER
           ================================================================ */
        .xi-number {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        /* ================================================================
           SCORE CELL COLORS
           ================================================================ */
        .score-excellent { color: #4ade80; font-weight: 700; }
        .score-good { color: #86efac; }
        .score-ok { color: var(--text-secondary); }
        .score-bad { color: #fca5a5; }
        .score-terrible { color: #f87171; font-weight: 700; }

        /* ================================================================
           POINT CHANGE FLASH ANIMATIONS (Live polling)
           ================================================================ */
        @keyframes flashUp {
            0% { background: rgba(74,222,128,0.3); }
            100% { background: transparent; }
        }
        @keyframes flashDown {
            0% { background: rgba(248,113,113,0.3); }
            100% { background: transparent; }
        }
        .pts-flash-up { animation: flashUp 1.5s ease-out; }
        .pts-flash-down { animation: flashDown 1.5s ease-out; }

        /* ================================================================
           H2H FORM ELEMENTS
           ================================================================ */
        .h2h-select {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-medium);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.8rem;
            font-family: 'Inter', system-ui, sans-serif;
            font-weight: 500;
            outline: none;
            transition: border-color var(--anim-fast), box-shadow var(--anim-fast);
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            min-width: 140px;
        }
        .h2h-select:focus {
            border-color: var(--border-accent);
            box-shadow: 0 0 0 2px rgba(249,115,22,0.15);
        }
        .h2h-compare-btn {
            padding: 8px 20px;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-weight: 700;
            font-size: 0.8rem;
            border: none;
            cursor: pointer;
            transition: all var(--anim-fast);
            font-family: 'Inter', system-ui, sans-serif;
        }
        .h2h-compare-btn:hover:not(:disabled) {
            background: var(--accent-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(249,115,22,0.3);
        }
        .h2h-compare-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        /* ================================================================
           POINTS PROGRESS CHART
           ================================================================ */
        .chart-line {
            transition: opacity 200ms, stroke-width 200ms;
        }
        .chart-hit-area {
            cursor: pointer;
        }
        .chart-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 6px;
            transition: background var(--anim-fast);
        }
        .chart-legend-item:hover {
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body x-data="fantasyApp()" x-init="init()" x-cloak>

    <!-- ============================================================
         HEADER
         ============================================================ -->
    <header class="header-bar">
        <div style="max-width: 1200px; margin: 0 auto; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #f97316, #fbbf24); display: flex; align-items: center; justify-content: center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#451a03" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                    </svg>
                </div>
                <div>
                    <div class="gradient-text" style="font-weight: 900; font-size: clamp(0.9rem, 2.5vw, 1.1rem); letter-spacing: -0.02em; line-height: 1.1;">IPL 2026</div>
                    <div style="font-size: 0.65rem; color: var(--text-muted); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;">Fantasy League</div>
                </div>
            </div>

            <!-- Tabs -->
            <nav style="display: flex; gap: 4px; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 3px;">
                <button class="tab-btn" :class="{ active: tab === 'standings' }" @click="tab = 'standings'">
                    <span style="display: flex; align-items: center; gap: 6px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 6-10"/></svg>
                        Standings
                    </span>
                </button>
                <button class="tab-btn" :class="{ active: tab === 'awards' }" @click="tab = 'awards'; loadAwards()">
                    <span style="display: flex; align-items: center; gap: 6px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                        Awards
                    </span>
                </button>
                <button class="tab-btn" :class="{ active: tab === 'trends' }" @click="tab = 'trends'">
                    <span style="display: flex; align-items: center; gap: 6px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        Trends
                    </span>
                </button>
                <button class="tab-btn" :class="{ active: tab === 'live' }" @click="tab = 'live'; loadLive()">
                    <span style="display: flex; align-items: center; gap: 6px;">
                        <template x-if="liveData?.match?.status === 'in_progress'">
                            <span class="live-dot" style="width: 6px; height: 6px;"></span>
                        </template>
                        <svg x-show="!liveData?.match?.status || liveData?.match?.status !== 'in_progress'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
                        Live
                    </span>
                </button>
            </nav>
        </div>
    </header>

    <!-- ============================================================
         MAIN CONTENT
         ============================================================ -->
    <main style="max-width: 1200px; margin: 0 auto; padding: 20px 16px; position: relative; z-index: 1;">

        <!-- ========================================================
             STANDINGS TAB
             ======================================================== -->
        <div x-show="tab === 'standings'" x-transition:enter="stagger-in" style="animation-delay: 0.05s;">

            <!-- Loading State -->
            <template x-if="loading && !standings.length">
                <div>
                    <template x-for="i in 5" :key="i">
                        <div class="card" style="padding: 20px; margin-bottom: 12px;">
                            <div style="display: flex; align-items: center; gap: 16px;">
                                <div class="shimmer" style="width: 36px; height: 36px; border-radius: 10px;"></div>
                                <div>
                                    <div class="shimmer" style="width: 140px; height: 16px; margin-bottom: 6px;"></div>
                                    <div class="shimmer" style="width: 80px; height: 12px;"></div>
                                </div>
                                <div style="margin-left: auto;">
                                    <div class="shimmer" style="width: 60px; height: 24px;"></div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Error State -->
            <template x-if="error && !standings.length">
                <div class="error-container">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" style="margin: 0 auto 16px;">
                        <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
                    </svg>
                    <p style="color: var(--text-secondary); margin-bottom: 16px;">Failed to load standings</p>
                    <button class="retry-btn" @click="loadStandings()">Retry</button>
                </div>
            </template>

            <!-- Standings Cards -->
            <template x-if="standings.length">
                <div>
                    <!-- Quick Stats Bar -->
                    <div style="display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;">
                        <div class="card-flat" style="padding: 10px 16px; display: flex; align-items: center; gap: 8px;">
                            <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 500;">Teams</span>
                            <span style="font-weight: 800; font-size: 0.9rem;" x-text="standings.length"></span>
                        </div>
                        <div class="card-flat" style="padding: 10px 16px; display: flex; align-items: center; gap: 8px;">
                            <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 500;">Leader</span>
                            <span class="gradient-text" style="font-weight: 800; font-size: 0.9rem;" x-text="standings[0]?.team_name"></span>
                        </div>
                        <div class="card-flat" style="padding: 10px 16px; display: flex; align-items: center; gap: 8px;" title="Only the best 11 players' points count toward the team total">
                            <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 500;">Top Score</span>
                            <span style="font-weight: 800; font-size: 0.9rem; color: var(--gold);" x-text="standings[0]?.total_pts + ' pts'"></span>
                        </div>
                    </div>

                    <!-- Head-to-Head Comparison -->
                    <div class="card" style="margin-bottom: 16px; overflow: visible;">
                        <!-- H2H Toggle Header -->
                        <div @click="h2hOpen = !h2hOpen"
                             style="padding: 14px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M16 3h5v5"/><path d="M8 3H3v5"/><path d="M21 3l-7 7"/><path d="M3 3l7 7"/><path d="M16 21h5v-5"/><path d="M8 21H3v-5"/><path d="M21 21l-7-7"/><path d="M3 21l7-7"/>
                            </svg>
                            <span class="heading-md" style="flex: 1;">Head-to-Head</span>
                            <svg class="accordion-chevron" :class="{ rotated: h2hOpen }"
                                 width="16" height="16" viewBox="0 0 24 24" fill="none"
                                 stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </div>

                        <!-- H2H Content -->
                        <div class="accordion-content" :class="{ open: h2hOpen }">
                            <div style="padding: 0 20px 20px;">
                                <!-- Selects + Button -->
                                <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;">
                                    <div style="position: relative;">
                                        <select class="h2h-select" x-model="h2hTeam1"
                                                style="padding-right: 28px;">
                                            <option value="" disabled>Team 1</option>
                                            <template x-for="team in standings" :key="'h2h1-' + team.team_name">
                                                <option :value="team.team_name" x-text="team.team_name"></option>
                                            </template>
                                        </select>
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round"
                                             style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none;">
                                            <polyline points="6 9 12 15 18 9"/>
                                        </svg>
                                    </div>

                                    <span style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted);">vs</span>

                                    <div style="position: relative;">
                                        <select class="h2h-select" x-model="h2hTeam2"
                                                style="padding-right: 28px;">
                                            <option value="" disabled>Team 2</option>
                                            <template x-for="team in standings" :key="'h2h2-' + team.team_name">
                                                <option :value="team.team_name" x-text="team.team_name"></option>
                                            </template>
                                        </select>
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round"
                                             style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none;">
                                            <polyline points="6 9 12 15 18 9"/>
                                        </svg>
                                    </div>

                                    <button class="h2h-compare-btn"
                                            :disabled="!h2hTeam1 || !h2hTeam2 || h2hTeam1 === h2hTeam2 || h2hLoading"
                                            @click="loadH2H()">
                                        <span x-show="!h2hLoading">Compare</span>
                                        <span x-show="h2hLoading">Loading...</span>
                                    </button>
                                </div>

                                <!-- H2H Validation message -->
                                <template x-if="h2hTeam1 && h2hTeam2 && h2hTeam1 === h2hTeam2">
                                    <div style="font-size: 0.75rem; color: #f87171; margin-bottom: 12px;">Please select two different teams.</div>
                                </template>

                                <!-- H2H Results -->
                                <template x-if="h2hData">
                                    <div>
                                        <!-- Two-column comparison -->
                                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                                            <!-- Team 1 Column -->
                                            <div class="card-flat" style="padding: 16px; position: relative;"
                                                 :style="h2hData.team1.total_pts > h2hData.team2.total_pts ? 'border-color: rgba(74,222,128,0.3); box-shadow: 0 0 16px rgba(74,222,128,0.05);' : ''">
                                                <template x-if="h2hData.team1.total_pts > h2hData.team2.total_pts">
                                                    <div style="position: absolute; top: 8px; right: 10px;">
                                                        <span style="font-size: 0.6rem; font-weight: 700; padding: 2px 8px; border-radius: 6px; background: rgba(74,222,128,0.12); color: #4ade80; text-transform: uppercase; letter-spacing: 0.04em;">Leading</span>
                                                    </div>
                                                </template>
                                                <div class="heading-md" style="margin-bottom: 4px;" x-text="h2hData.team1.team_name"></div>
                                                <div style="font-size: 1.25rem; font-weight: 800; margin-bottom: 12px;"
                                                     :style="h2hData.team1.total_pts >= h2hData.team2.total_pts ? 'color: var(--gold);' : 'color: var(--text-secondary);'">
                                                    <span x-text="h2hData.team1.total_pts"></span>
                                                    <span style="font-size: 0.65rem; font-weight: 500; color: var(--text-muted); margin-left: 2px;">pts</span>
                                                </div>
                                                <!-- Player list -->
                                                <div style="display: flex; flex-direction: column; gap: 4px; max-height: 320px; overflow-y: auto;">
                                                    <template x-for="(p, pi) in h2hData.team1.players" :key="'h2h1p-' + p.player_name">
                                                        <div style="display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03);"
                                                             :style="pi === h2hData.team1.players.length - 1 ? 'border-bottom: none;' : ''">
                                                            <span style="font-size: 0.65rem; font-weight: 700; color: var(--text-dimmed); width: 16px; text-align: right;" x-text="pi + 1"></span>
                                                            <div style="flex: 1; min-width: 0;">
                                                                <div style="font-weight: 600; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" x-text="p.player_name"></div>
                                                                <div style="font-size: 0.6rem; color: var(--text-dimmed); display: flex; gap: 6px;" class="hide-mobile">
                                                                    <span x-show="p.batting_pts" style="color: #60a5fa;" x-text="'B:' + p.batting_pts"></span>
                                                                    <span x-show="p.bowling_pts" style="color: #a78bfa;" x-text="'Bw:' + p.bowling_pts"></span>
                                                                    <span x-show="p.fielding_pts" style="color: #fbbf24;" x-text="'F:' + p.fielding_pts"></span>
                                                                </div>
                                                            </div>
                                                            <span class="pts-highlight" style="font-size: 0.8rem; flex-shrink: 0;" x-text="p.total_pts"></span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>

                                            <!-- Team 2 Column -->
                                            <div class="card-flat" style="padding: 16px; position: relative;"
                                                 :style="h2hData.team2.total_pts > h2hData.team1.total_pts ? 'border-color: rgba(74,222,128,0.3); box-shadow: 0 0 16px rgba(74,222,128,0.05);' : ''">
                                                <template x-if="h2hData.team2.total_pts > h2hData.team1.total_pts">
                                                    <div style="position: absolute; top: 8px; right: 10px;">
                                                        <span style="font-size: 0.6rem; font-weight: 700; padding: 2px 8px; border-radius: 6px; background: rgba(74,222,128,0.12); color: #4ade80; text-transform: uppercase; letter-spacing: 0.04em;">Leading</span>
                                                    </div>
                                                </template>
                                                <div class="heading-md" style="margin-bottom: 4px;" x-text="h2hData.team2.team_name"></div>
                                                <div style="font-size: 1.25rem; font-weight: 800; margin-bottom: 12px;"
                                                     :style="h2hData.team2.total_pts >= h2hData.team1.total_pts ? 'color: var(--gold);' : 'color: var(--text-secondary);'">
                                                    <span x-text="h2hData.team2.total_pts"></span>
                                                    <span style="font-size: 0.65rem; font-weight: 500; color: var(--text-muted); margin-left: 2px;">pts</span>
                                                </div>
                                                <!-- Player list -->
                                                <div style="display: flex; flex-direction: column; gap: 4px; max-height: 320px; overflow-y: auto;">
                                                    <template x-for="(p, pi) in h2hData.team2.players" :key="'h2h2p-' + p.player_name">
                                                        <div style="display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03);"
                                                             :style="pi === h2hData.team2.players.length - 1 ? 'border-bottom: none;' : ''">
                                                            <span style="font-size: 0.65rem; font-weight: 700; color: var(--text-dimmed); width: 16px; text-align: right;" x-text="pi + 1"></span>
                                                            <div style="flex: 1; min-width: 0;">
                                                                <div style="font-weight: 600; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" x-text="p.player_name"></div>
                                                                <div style="font-size: 0.6rem; color: var(--text-dimmed); display: flex; gap: 6px;" class="hide-mobile">
                                                                    <span x-show="p.batting_pts" style="color: #60a5fa;" x-text="'B:' + p.batting_pts"></span>
                                                                    <span x-show="p.bowling_pts" style="color: #a78bfa;" x-text="'Bw:' + p.bowling_pts"></span>
                                                                    <span x-show="p.fielding_pts" style="color: #fbbf24;" x-text="'F:' + p.fielding_pts"></span>
                                                                </div>
                                                            </div>
                                                            <span class="pts-highlight" style="font-size: 0.8rem; flex-shrink: 0;" x-text="p.total_pts"></span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Points diff summary -->
                                        <div style="text-align: center; margin-top: 12px; font-size: 0.75rem; color: var(--text-muted);">
                                            Difference: <span style="font-weight: 700; color: var(--text-primary);" x-text="Math.abs(h2hData.team1.total_pts - h2hData.team2.total_pts) + ' pts'"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- Team Cards -->
                    <template x-for="(team, idx) in standings" :key="team.team_name">
                        <div class="card stagger-in" :style="'margin-bottom: 10px; animation-delay: ' + (idx * 0.04) + 's;'">
                            <!-- Team Header Row -->
                            <div @click="toggleTeam(team.team_name)"
                                 class="team-header-row"
                                 style="padding: 14px 18px; cursor: pointer; display: flex; align-items: center; gap: 12px; user-select: none; flex-wrap: nowrap;">

                                <!-- Rank Badge -->
                                <div class="rank-badge"
                                     :class="{
                                         'rank-1': idx === 0,
                                         'rank-2': idx === 1,
                                         'rank-3': idx === 2,
                                         'rank-default': idx > 2
                                     }">
                                    <span x-text="idx + 1"></span>
                                </div>

                                <!-- Team Info -->
                                <div style="flex: 1; min-width: 0; overflow: hidden;">
                                    <div style="display: flex; align-items: center; gap: 6px;">
                                        <span class="heading-md" x-text="team.team_name" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;"></span>
                                        <template x-if="team.rank_change && team.rank_change > 0">
                                            <span style="color: #4ade80; font-size: 0.65rem; font-weight: 700; flex-shrink: 0;">
                                                <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor" style="display: inline; vertical-align: middle;"><path d="M12 4l-8 8h5v8h6v-8h5z"/></svg>
                                                <span x-text="team.rank_change"></span>
                                            </span>
                                        </template>
                                        <template x-if="team.rank_change && team.rank_change < 0">
                                            <span style="color: #f87171; font-size: 0.65rem; font-weight: 700; flex-shrink: 0;">
                                                <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor" style="display: inline; vertical-align: middle;"><path d="M12 20l8-8h-5V4H9v8H4z"/></svg>
                                                <span x-text="Math.abs(team.rank_change)"></span>
                                            </span>
                                        </template>
                                    </div>
                                    <div class="team-info-sub" style="display: flex; align-items: center; gap: 8px; margin-top: 2px; flex-wrap: wrap;">
                                        <span style="font-size: 0.65rem; color: var(--text-muted);">
                                            <span x-text="team.players?.length || 0"></span> players
                                        </span>
                                        <template x-if="getTeamCaptain(team.team_name)">
                                            <span style="font-size: 0.6rem; color: var(--text-muted); white-space: nowrap;">
                                                <span class="badge-c">C</span>
                                                <span x-text="getTeamCaptain(team.team_name)" style="margin-left: 2px;"></span>
                                            </span>
                                        </template>
                                        <template x-if="getTeamVC(team.team_name)">
                                            <span style="font-size: 0.6rem; color: var(--text-muted); white-space: nowrap;">
                                                <span class="badge-vc">VC</span>
                                                <span x-text="getTeamVC(team.team_name)" style="margin-left: 2px;"></span>
                                            </span>
                                        </template>
                                    </div>
                                </div>

                                <!-- Sparkline (pts_history) -->
                                <template x-if="team.pts_history && team.pts_history.length >= 2">
                                    <div class="hide-mobile" style="flex-shrink: 0;">
                                        <svg width="64" height="20" viewBox="0 0 64 20" style="overflow: visible; display: block;">
                                            <defs>
                                                <linearGradient :id="'spark-fill-' + idx" x1="0" x2="0" y1="0" y2="1">
                                                    <stop offset="0%" stop-color="#f97316" stop-opacity="0.25"/>
                                                    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
                                                </linearGradient>
                                            </defs>
                                            <polygon :points="computeSparkline(team.pts_history, 64, 20) + ' 64,20 0,20'"
                                                     :fill="'url(#spark-fill-' + idx + ')'" stroke="none"/>
                                            <polyline :points="computeSparkline(team.pts_history, 64, 20)"
                                                      fill="none" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </div>
                                </template>

                                <!-- Points & Gap -->
                                <div style="text-align: right; flex-shrink: 0; min-width: 50px;">
                                    <div class="pts-highlight team-pts" style="font-size: 1.15rem; letter-spacing: -0.02em;"
                                         :style="idx === 0 ? 'color: var(--gold);' : ''">
                                        <span x-text="team.total_pts"></span>
                                        <span style="font-size: 0.6rem; font-weight: 500; color: var(--text-muted); margin-left: 1px;">pts</span>
                                    </div>
                                    <template x-if="idx > 0">
                                        <div style="font-size: 0.6rem; color: var(--text-dimmed); margin-top: 1px; white-space: nowrap;">
                                            <span x-text="(team.total_pts - standings[0].total_pts) + ' from #1'"></span>
                                        </div>
                                    </template>
                                </div>

                                <!-- Chevron -->
                                <svg class="accordion-chevron" style="flex-shrink: 0;"
                                     :class="{ rotated: expandedTeam === team.team_name }"
                                     width="16" height="16" viewBox="0 0 24 24" fill="none"
                                     stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round">
                                    <polyline points="6 9 12 15 18 9"/>
                                </svg>
                            </div>

                            <!-- Expanded Player Table -->
                            <div class="accordion-content"
                                 :class="{ open: expandedTeam === team.team_name }">

                                <!-- Loading detail -->
                                <template x-if="expandedTeam === team.team_name && loadingDetail">
                                    <div style="padding: 20px; display: flex; flex-direction: column; gap: 8px;">
                                        <template x-for="i in 8" :key="i">
                                            <div class="shimmer" style="height: 32px; width: 100%;"></div>
                                        </template>
                                    </div>
                                </template>

                                <!-- Team Detail -->
                                <template x-if="expandedTeam === team.team_name && teamDetail && !loadingDetail">
                                    <div>
                                        <!-- Summary stats row -->
                                        <div style="padding: 0 20px 12px; display: flex; gap: 8px; flex-wrap: wrap;">
                                            <div style="background: var(--bg-surface); padding: 6px 12px; border-radius: 8px; font-size: 0.7rem;" title="Sum of the 11 highest-scoring players on the roster">
                                                <span style="color: var(--text-muted);">Top 11 Scoring</span>
                                                <span style="font-weight: 700; margin-left: 6px;" x-text="team.total_pts + ' pts'"></span>
                                            </div>
                                            <template x-if="teamDetail.matches?.length">
                                                <div style="background: var(--bg-surface); padding: 6px 12px; border-radius: 8px; font-size: 0.7rem;">
                                                    <span style="color: var(--text-muted);">Matches</span>
                                                    <span style="font-weight: 700; margin-left: 6px;" x-text="teamDetail.matches.length"></span>
                                                </div>
                                            </template>
                                            <div style="background: var(--bg-surface); padding: 6px 12px; border-radius: 8px; font-size: 0.7rem;" title="Average team points per match (top 11 total / matches played)">
                                                <span style="color: var(--text-muted);">Avg Score</span>
                                                <span style="font-weight: 700; margin-left: 6px;"
                                                      x-text="teamDetail.matches?.length ? Math.round(team.total_pts / teamDetail.matches.length) + ' pts/match' : 'N/A'"></span>
                                            </div>
                                        </div>

                                        <!-- Player Table -->
                                        <div class="table-scroll">
                                            <table class="player-table">
                                                <thead>
                                                    <tr>
                                                        <th style="width: 32px;">#</th>
                                                        <th>Player</th>
                                                        <th style="text-align: right;">Total</th>
                                                        <th style="text-align: center;">M</th>
                                                        <th class="hide-mobile" style="text-align: right;">Avg</th>
                                                        <template x-if="teamDetail.matches">
                                                            <template x-for="match in teamDetail.matches" :key="match.match_id">
                                                                <th class="match-cell" :title="match.teams?.join(' vs ')" x-text="match.label"></th>
                                                            </template>
                                                        </template>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template x-for="(player, pIdx) in teamDetail.players" :key="player.player_name">
                                                        <tr :class="{ 'player-dimmed': pIdx >= 11, 'player-expanded': expandedPlayer === player.player_name }" @click="expandedPlayer = expandedPlayer === player.player_name ? null : player.player_name" style="cursor: pointer;">
                                                            <!-- # -->
                                                            <td>
                                                                <span style="font-weight: 700; font-size: 0.7rem; color: var(--text-muted);" x-text="pIdx + 1"></span>
                                                            </td>
                                                            <!-- Player Name + badges -->
                                                            <td>
                                                                <div style="display: flex; align-items: center; gap: 6px; flex-wrap: nowrap;">
                                                                    <!-- Role pill -->
                                                                    <span class="role-pill"
                                                                          :class="getRolePillClass(player.player_name)"
                                                                          x-text="getPlayerRole(player.player_name)"
                                                                          x-show="getPlayerRole(player.player_name)"></span>
                                                                    <div>
                                                                        <div style="display: flex; align-items: center; gap: 0; flex-wrap: nowrap;">
                                                                            <span style="font-weight: 600; font-size: 0.8rem;" x-text="player.display_name || player.player_name"></span>
                                                                            <template x-if="getPlayerDesignation(team.team_name, player.player_name) === 'C'">
                                                                                <span class="badge-c" title="Captain: 2x points">C</span>
                                                                            </template>
                                                                            <template x-if="getPlayerDesignation(team.team_name, player.player_name) === 'VC'">
                                                                                <span class="badge-vc" title="Vice Captain: 1.5x points">VC</span>
                                                                            </template>
                                                                        </div>
                                                                        <div style="font-size: 0.6rem; color: var(--text-dimmed); margin-top: 1px;"
                                                                             x-text="getPlayerIPLTeam(player.player_name)"
                                                                             x-show="getPlayerIPLTeam(player.player_name)"></div>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                            <!-- Total -->
                                                            <td style="text-align: right;">
                                                                <template x-if="getPlayerDesignation(team.team_name, player.player_name) === 'C'">
                                                                    <span style="display: inline-flex; align-items: center; gap: 3px;">
                                                                        <span style="font-size: 0.65rem; color: var(--text-muted);" x-text="player.raw_pts"></span>
                                                                        <span style="font-size: 0.55rem; color: var(--text-dimmed);">&rarr;</span>
                                                                        <span class="pts-highlight" x-text="player.total_pts"></span>
                                                                        <span class="multiplier-badge">2x</span>
                                                                    </span>
                                                                </template>
                                                                <template x-if="getPlayerDesignation(team.team_name, player.player_name) === 'VC'">
                                                                    <span style="display: inline-flex; align-items: center; gap: 3px;">
                                                                        <span style="font-size: 0.65rem; color: var(--text-muted);" x-text="player.raw_pts"></span>
                                                                        <span style="font-size: 0.55rem; color: var(--text-dimmed);">&rarr;</span>
                                                                        <span class="pts-highlight" x-text="player.total_pts"></span>
                                                                        <span class="multiplier-badge">1.5x</span>
                                                                    </span>
                                                                </template>
                                                                <template x-if="!getPlayerDesignation(team.team_name, player.player_name)">
                                                                    <span class="pts-highlight" x-text="player.total_pts"></span>
                                                                </template>
                                                            </td>
                                                            <!-- Matches -->
                                                            <td style="text-align: center; color: var(--text-secondary);">
                                                                <span x-text="player.matches_played"></span>
                                                            </td>
                                                            <!-- Average -->
                                                            <td class="hide-mobile" style="text-align: right; color: var(--text-secondary);">
                                                                <span x-text="player.matches_played > 0 ? (player.total_pts / player.matches_played).toFixed(1) : '-'"></span>
                                                            </td>
                                                            <!-- Per-match scores -->
                                                            <template x-if="teamDetail.matches">
                                                                <template x-for="match in teamDetail.matches" :key="match.match_id">
                                                                    <td class="match-cell"
                                                                        :class="getScoreClass(getMatchScore(player, match.label))"
                                                                        x-text="getMatchScore(player, match.label) !== null ? getMatchScore(player, match.label) : '-'">
                                                                    </td>
                                                                </template>
                                                            </template>
                                                        </tr>
                                                        <!-- Breakdown expansion row (inside same x-for) -->
                                                        <tr x-show="expandedPlayer === player.player_name" x-cloak style="border-top: none;">
                                                            <td :colspan="4 + (teamDetail.matches?.length || 0)" style="padding: 4px 12px 10px; background: rgba(255,255,255,0.02);">
                                                                <div style="display: flex; flex-wrap: wrap; gap: 5px; align-items: center;">
                                                                    <template x-for="chip in getPlayerBreakdown(player)" :key="chip.l">
                                                                        <span style="display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 12px; font-size: 0.68rem; font-weight: 500;"
                                                                              :style="chip.p >= 0 ? 'background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.2);' : 'background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.2);'">
                                                                            <span x-text="chip.l"></span>
                                                                            <span style="font-weight: 700;" x-text="(chip.p >= 0 ? '+' : '') + chip.p"></span>
                                                                        </span>
                                                                    </template>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>

                                        <!-- Bench divider note -->
                                        <template x-if="teamDetail.players?.length > 11">
                                            <div style="padding: 8px 20px 16px; font-size: 0.65rem; color: var(--text-dimmed); display: flex; align-items: center; gap: 8px;">
                                                <div style="flex: 1; height: 1px; background: var(--border-subtle);"></div>
                                                <span>Players 12+ are on the bench (not counted in team total)</span>
                                                <div style="flex: 1; height: 1px; background: var(--border-subtle);"></div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>


        <!-- ========================================================
             TRENDS TAB
             ======================================================== -->
        <div x-show="tab === 'trends'" x-transition:enter="stagger-in" style="animation-delay: 0.05s;">
            <template x-if="standings.length && standings[0]?.pts_history?.length >= 1">
                <div class="card" style="margin-bottom: 16px; padding: 16px 18px; overflow: visible;">
                    <!-- Chart Title -->
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                        </svg>
                        <span class="heading-md" style="font-size: 0.9rem;">Cumulative Points Progress</span>
                    </div>

                    <!-- SVG Chart — built via innerHTML to avoid template-in-SVG issues -->
                    <div x-ref="chartContainer"
                         x-effect="$refs.chartContainer.innerHTML = buildChartSVG(standings, highlightedTeam)"
                         @mouseleave="highlightedTeam = null"
                         @mouseenter.self="highlightedTeam = null"
                         @click="handleChartClick($event, standings)"
                         @mousemove="handleChartHover($event, standings)"
                         @touchstart.passive="handleChartHover($event, standings)"
                         @touchend="highlightedTeam = null"
                         style="width: 100%;"></div>

                    <!-- Legend -->
                    <div style="display: flex; flex-wrap: wrap; gap: 4px 12px; margin-top: 12px;">
                        <template x-for="(team, tIdx) in standings" :key="'legend-' + team.team_name">
                            <div class="chart-legend-item"
                                 @mouseenter="highlightedTeam = team.team_name"
                                 @mouseleave="highlightedTeam = null"
                                 @touchstart.passive="highlightedTeam = team.team_name"
                                 @touchend="highlightedTeam = null">
                                <span :style="'display:inline-block; width:8px; height:8px; border-radius:50%; background:' + teamColors[tIdx % teamColors.length] + '; flex-shrink:0;'"></span>
                                <span style="font-size: 0.7rem; color: var(--text-secondary); white-space: nowrap;" x-text="team.team_name"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Empty state when no history -->
            <template x-if="!standings.length || !standings[0]?.pts_history?.length">
                <div class="card" style="padding: 40px 20px; text-align: center;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--text-dimmed)" stroke-width="1.5" stroke-linecap="round" style="margin: 0 auto 12px;">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                    <div style="color: var(--text-muted); font-size: 0.85rem;">Trends will appear after multiple matches are played</div>
                </div>
            </template>
        </div>


        <!-- ========================================================
             AWARDS TAB
             ======================================================== -->
        <div x-show="tab === 'awards'" x-transition:enter="stagger-in" style="animation-delay: 0.05s;">

            <!-- Loading -->
            <template x-if="loadingAwards && !awards">
                <div>
                    <div class="shimmer" style="height: 40px; width: 200px; margin-bottom: 20px;"></div>
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;">
                        <template x-for="i in 6" :key="i">
                            <div class="shimmer" style="height: 140px; border-radius: 16px;"></div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Error -->
            <template x-if="awardsError && !awards">
                <div class="error-container">
                    <p style="color: var(--text-secondary); margin-bottom: 16px;">Failed to load awards</p>
                    <button class="retry-btn" @click="loadAwards()">Retry</button>
                </div>
            </template>
