name: Keep Render Alive
on:
  schedule:
    # Every 14 minutes during IPL match hours (08:30-18:30 UTC = 14:00-00:00 IST)
    - cron: '*/14 8-18 * 3-5 *'  # March through May
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: curl -sf "${{ secrets.RENDER_URL }}" > /dev/null
